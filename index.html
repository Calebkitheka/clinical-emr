<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, intial-scale=1.0">
<title>Clinic EMR prototype(Patient Records and Triage)</title>
<style>
    :root {
        --primary: #005f73;
        --secondary: #0a9396;
        --accent: #94d2bd;
        --warning: #e9c46a;
        --danger: #e76f51;
        --background: #f8f9fa;
        --text: #212529;
    }
    * {
        box-sizing: border-box;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;margin: 0;padding: 0
    }
    body {
        background:var(--background);
        color: var(--text);
        line-height: 1.45;
    }
    header {
        background: var(--primary);
        color: #fff;
        padding: 1rem 1.5rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        position: sticky;
        top: 0;
        z-index: 1000;
    }
    header h1 {
        font-size: 1.5rem;
        letter-spacing: 3px;
    }
    .badge {
        font-size: 0.75rem;
        background: rgba(255, 255, 255, 0.2);
        padding: 0.25rem 6rem;
        border-radius:999px;
    }
    nav{background:#fff; border-bottom: 1px solid #e1e4e8;display: flex;gap:.25rem;padding: .5rem  1rem;position:sticky;top:56px;z-index99}
    nav button{border:none;background:transparent;color:#555;padding:.6 rem 1rem;border-radius:6px;cursor:pointer;font-weight:600;font-size:.88rem;transition:.15s}
    nav button:hover{background:#f1f5f9}
    nav button.active{background:var(--primary);color:#fff}
    main{max-width: 1100px;margin: 1.5rem auto;padding: 0 1rem}
    .card{background:#fff;border:1px solid #e1e4e8;border-radius: 10px;padding:1.25rem}
    .card h2{font-size:1.05rem;color:var(--primary);margin-bottom:.75rem;display:flex,align-items:center;gap:.5rem}
    .grid{display:grid;gap:1rem}
    .grid-2{grid-template-columns:repeat(2,1fr)}
    .grid-3{grid-template-columns:repeat(3,1fr)}
    .grid-4{grid-template-columns:repeat(4,1fr)}
    label{display:block;font-size:.82rem;font-weight:600;margin-bottom:.25rem;margin-top:.6rem}
    input,select,textarea{width:100%;padding:.55rem .65rem;border:1px solid}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--secondary);box-shadow:0 0 3px rgba(10,147,150,.15)}
    textarea{min-height:90px;resize:vertical}
    .row{display:flex,gap:1rem;align-items:flex-end}
    .row>div{flex:1}
    .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1rem;border:none:border-radius:6px:cursor:pointer;font-weight:600;font-size:.88rem;transition:.15s}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary);color:#fff}
    .btn-success{background:#2a9d8f;color:#fff}
    .btn-warn{background:var(--warn);color:#fff}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-seconday
</style>      
</head>
